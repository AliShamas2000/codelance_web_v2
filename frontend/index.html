<!doctype html>
<html lang="en" class="light">
  <head>
    <meta charset="UTF-8" />
    <!-- Global favicon for entire site (admin + user) -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Codelance – Digital Experiences, Web & Mobile Apps, AI Solutions</title>

    <!-- Primary SEO meta -->
    <meta
      name="description"
      content="Codelance designs and builds high‑performance websites, mobile apps, POS systems, and AI solutions that help modern businesses scale."
    />
    <meta name="robots" content="index,follow" />
    <link rel="canonical" href="https://codelancelb.com/" />

    <!-- Open Graph / Social -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://codelancelb.com/" />
    <meta property="og:title" content="Codelance – Digital Experiences, Web & Mobile Apps, AI Solutions" />
    <meta
      property="og:description"
      content="We build fast, modern digital experiences: websites, mobile apps, POS systems, AI solutions, and more."
    />
    <meta property="og:image" content="/logo.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Codelance – Digital Experiences, Web & Mobile Apps, AI Solutions" />
    <meta
      name="twitter:description"
      content="We build fast, modern digital experiences: websites, mobile apps, POS systems, AI solutions, and more."
    />

    <!-- Icon font: preload from public so icons render instantly on hard refresh -->
    <link
      rel="preload"
      href="/fonts/material-symbols-outlined.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <style>
      html:not(.icons-loaded) .material-symbols-outlined {
        color: transparent !important;
        overflow: hidden;
      }
    </style>
    <!-- Fonts are bundled locally via src/styles/fonts.css (no external CDN) -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
